<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillBreeze</title>
    <link rel="stylesheet" href="/dist-output.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

    <nav class="bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center text-white text-sm">⚡</div>
            <span class="font-medium text-gray-900 dark:text-white">BillBreeze</span>
        </div>
        <button id="signOutBtn" type="button" hidden
            class="text-sm px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            Sign out
        </button>
    </nav>

    <main class="w-full max-w-md mx-auto mt-12 px-4 box-border">

        <!-- Auth card -->
        <div id="authCard" class="w-full bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 overflow-hidden mb-4">
            <div class="px-6 pt-6 pb-2">
                <h1 class="text-lg font-medium text-gray-900 dark:text-white mb-1">Welcome to BillBreeze</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400">Sign in to manage your bills</p>
            </div>
            <div class="px-6 pb-6 pt-4">

                <!-- Google -->
                <button id="signBtn" type="button"
                    class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-gray-200 dark:border-gray-600 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="flex items-center gap-3 my-4">
                    <div class="flex-1 h-px bg-gray-100 dark:bg-gray-700"></div>
                    <span class="text-xs text-gray-400">or</span>
                    <div class="flex-1 h-px bg-gray-100 dark:bg-gray-700"></div>
                </div>

                <!-- Create account -->
                <div id="signUpSection" class="space-y-2">
                    <input id="email" type="text" placeholder="Email address" hidden
                        class="w-full px-3 py-2.5 text-sm border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-500">
                    <input id="password" type="password" placeholder="Password" hidden
                        class="w-full px-3 py-2.5 text-sm border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-500">
                    <button id="createUserBtn" type="button" hidden
                        class="w-full py-2.5 text-sm font-medium bg-sky-500 hover:bg-sky-600 text-white rounded-xl transition-colors">
                        Create account
                    </button>
                    <button id="signUp" type="button"
                        class="w-full py-2.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
                        New here? Create an account
                    </button>
                </div>

                <div class="h-px bg-gray-100 dark:bg-gray-700 my-3"></div>

                <!-- Sign in with email -->
                <div id="loginSection" class="space-y-2">
                    <input id="alreadyEmail" type="text" placeholder="Email address" hidden
                        class="w-full px-3 py-2.5 text-sm border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-500">
                    <input id="alreadyPassword" type="password" placeholder="Password" hidden
                        class="w-full px-3 py-2.5 text-sm border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-500">
                    <button id="logUserBtn" type="button" hidden
                        class="w-full py-2.5 text-sm font-medium bg-sky-500 hover:bg-sky-600 text-white rounded-xl transition-colors">
                        Sign in
                    </button>
                    <button id="logAlreadyUser" type="button"
                        class="w-full py-2.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
                        Already have an account? Sign in
                    </button>
                </div>

            </div>
        </div>

        <!-- Upload card -->
        <div id="inputContainer" hidden
            class="w-full bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 overflow-hidden mb-4">
            <div class="px-6 pt-6 pb-2">
                <h2 class="text-lg font-medium text-gray-900 dark:text-white mb-1">Upload a bill</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">We'll extract and organise the details for you</p>
            </div>
            <div class="px-6 pb-6 pt-4">
                <form id="uploadForm" method="post" class="space-y-3">

                    <label for="input"
                        class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:border-sky-400 hover:bg-sky-50 dark:hover:bg-sky-900/10 transition-colors">
                        <span class="text-3xl mb-2">☁️</span>
                        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Drop your file here</span>
                        <span class="text-xs text-gray-400 mt-1">or click to browse</span>
                        <div class="flex gap-2 mt-3">
                            <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400">PDF</span>
                            <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400">JPEG</span>
                            <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400">JPG</span>
                            <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400">PNG</span>
                        </div>
                    </label>

                    <input type="file" accept="application/pdf,image/jpeg,image/png" id="input" class="hidden">

                    <p id="inputMsg" class="text-xs text-gray-400 text-center">No file selected yet</p>

                    <div id="previewContainer" class="hidden w-full h-48 rounded-xl overflow-hidden border border-gray-100 dark:border-gray-700"></div>

                    <button id="cancelBtn" type="button" hidden
                    class="w-full py-2 text-sm text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                    ✕ Clear selection
                </button>

                <button id="submitBtn" type="submit" disabled
                    class="w-full py-2.5 text-sm font-medium bg-sky-500 hover:bg-sky-600 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl transition-colors">
                    Analyse bill
                </button>

                <p id="loading" hidden class="text-sm text-center text-gray-400">Analysing your bill...</p>
            </form>
        </div>
    </div>

    <!-- Output -->
    <div id="infoOutputContainer" class="mb-12"></div>

</main>

<script defer type="module" src="./index.js"></script>
</body>
</html>
